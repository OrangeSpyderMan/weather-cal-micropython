name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Compile check
        run: python3 -m compileall -q weathercal tests tools main.py
